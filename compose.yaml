services:
  transaction-service-db:
    image: postgres:15-alpine
    container_name: transaction-service-db
    environment:
      POSTGRES_DB: nexus_transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d nexus_transactions" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  transaction-db-data: